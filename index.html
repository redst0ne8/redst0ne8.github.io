<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>redst0ne8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: #1e1e24;
      --accent: #ff0000;
      --accent2: #ff4747;
      --text: #e2e2e8;
      --muted: #555562;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.6;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(255,0,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(80px, 16vw, 140px);
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.04em;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s forwards;
      position: relative;
      display: inline-block;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      animation: lineExpand 0.5s 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .username {
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      margin-top: 16px;
      opacity: 0;
      animation: fadeUp 0.6s 0.35s forwards;
    }

    .divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      margin: 24px 0;
      opacity: 0;
      animation: fadeUp 0.6s 0.45s forwards;
    }

    .github-link {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 0.6s 0.55s forwards;
      transition: color 0.2s;
      margin-bottom: 28px;
    }

    .github-link:hover {
      color: var(--text);
    }

    .github-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.65s forwards;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 28px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255,0,0,0.04);
    }

    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      opacity: 0;
      animation: fadeIn 0.4s 1s forwards;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--muted); border-right: 1px solid var(--muted); }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--muted); border-right: 1px solid var(--muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes lineExpand {
      to { transform: scaleX(1); }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <main class="page">
    <span class="logo">R</span>
    <span class="username">redst0ne8</span>
    <div class="divider"></div>
    <a class="github-link" href="https://github.com/redst0ne8" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      github.com/redst0ne8
    </a>
    <div class="buttons">
      <a class="btn" href="https://stonebots.redst0ne8.site/" target="_blank" rel="noopener">Stone Bots</a>
      <a class="btn" href="https://portfolio.redst0ne8.site/" target="_blank" rel="noopener">Portfolio</a>
    </div>
  </main>

</body>
</html>
